<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
    <f:layout name="Widget/Widget"/>
    <f:section name="main">
        <div class="addbtn">
            <f:render partial="Widget/Button" arguments="{button: button}"/>
        </div>
        <div class="widget-content" style="overflow-y:auto;">
            <table class="table table-sm table-striped" style="font-size:12px;">
                <thead>
                    <tr>
                        <th><f:translate key="LLL:EXT:rubin_events/Resources/Private/Language/locallang_db.xlf:widget.col.date" /></th>
                        <th><f:translate key="LLL:EXT:rubin_events/Resources/Private/Language/locallang_db.xlf:widget.col.title" /></th>
                        <th><f:translate key="LLL:EXT:rubin_events/Resources/Private/Language/locallang_db.xlf:widget.col.teaser" /></th>
                        <th><f:translate key="LLL:EXT:rubin_events/Resources/Private/Language/locallang_db.xlf:widget.col.location" /></th>
                    </tr>
                </thead>
                <tbody>
                    <f:for each="{events}" as="event">
                        <tr>
                            <f:if condition="{event.uid} == {nextEvent.uid}">
                                <f:then>
                                    <td><strong style="color: #ff8700;"><f:format.date format="d.m.Y H:i">{event.eventStart}</f:format.date></strong></td>
                                    <td><strong style="color: #ff8700;">{event.title}</strong></td>
                                    <td><strong style="color: #ff8700;">{event.teaser}</strong></td>
                                    <td><strong style="color: #ff8700;">{event.location}</strong></td>
                                </f:then>
                                <f:else>
                                    <td><f:format.date format="d.m.Y H:i">{event.eventStart}</f:format.date></td>
                                    <td>{event.title}</td>
                                    <td>{event.teaser}</td>
                                    <td>{event.location}</td>
                                </f:else>
                            </f:if>
                        </tr>
                    </f:for>
                </tbody>
            </table>
        </div>
    </f:section>
</html>

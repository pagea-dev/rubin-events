<html xmlns:f="http://typo3.org/ns/TYPO3/Fluid/ViewHelpers"
      xmlns:r="http://typo3.org/ns/PageaDev/RubinEvents/ViewHelpers"
      data-namespace-typo3-fluid="true">


    <div class="multislider" data-tiny-slider='{
        "controls": true, "nav": false, "slideBy": 1, "mouseDrag": true, "gutter": 24,
        "controlsPosition": "bottom", "navPosition": "bottom",
        "controlsText": [
            "<i class=\"rubinicon-arrow_back\"></i>",
            "<i class=\"rubinicon-arrow_forward\"></i>"
        ],
        "responsive": {
            "0": {
            "items": 1
            },
            "576": {
            "items": 2
            },
            "768": {
            "items": 3
            }
        }
    }'>

        <f:for each="{events}" as="event" iteration="i">
            <div class="item item-{i.index}">
                <div class="event-inner d-flex flex-wrap justify-content-start align-items-center">
                    
                    <div class="text-area">
                        <div class="datetimetitle">
                            <div class="date">
                                <div class="daymonth font-headline">
                                    <r:format.localizedDate date="{event.eventStart}" format="d. M" />
                                </div>
                                <div class="year font-headline">
                                    <r:format.localizedDate date="{event.eventStart}" format="Y" />
                                </div>
                            </div>
                            <div class="title font-headline">
                                <f:format.crop maxCharacters="45" append="..." respectWordBoundaries="1" respectHtml="1">{event.title}</f:format.crop>
                            </div>
                        </div>
                        <f:if condition="{event.teaser}">
                            <div class="teaser icontext">
                                <div class="ico">
                                    <i class="rubinicon-info_outline"></i>
                                </div>
                                <div class="text">
                                    <i><f:format.crop maxCharacters="250" append="..." respectWordBoundaries="1" respectHtml="1">{event.teaser}</f:format.crop></i>
                                </div>
                            </div>
                        </f:if>
                        <f:if condition="{event.location}">
                            <div class="location icontext">
                                <div class="ico">
                                    <i class="rubinicon-location_on"></i>
                                </div>
                                <div class="text">
                                    {event.location}
                                </div>
                            </div>
                        </f:if>
                    </div>
                    <div class="readmore">
                        <f:link.action class="btn btn-ghost" pageUid="{settings.pidShow}" action="show" arguments="{event: event}"><f:translate key="tinyslider.readmore" extensionName="RubinEvents" /></f:link.action>
                    </div>
                        
                </div>
            </div>
        </f:for>

    </div>

    <f:if condition="{settings.pidList}">
        <div class="list-button">
            <f:link.action action="list" pageUid="{settings.pidList}" class="btn btn-primary"><f:translate key="tinyslider.allEvents" extensionName="RubinEvents" /></f:link.action>
        </div>
    </f:if>
</html>
